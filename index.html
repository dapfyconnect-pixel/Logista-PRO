<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAPfy Connect | Gestão de Cashback</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.2);
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ff4757;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 24px;
        }

        /* Reset e Base */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* Container Principal Responsivo */
        .app-card { 
            background: var(--card-bg); 
            width: 100%; 
            height: 100%; 
            max-width: 450px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        @media (min-width: 768px) { 
            .app-card { height: 90vh; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5); } 
        }

        /* Header Fixado */
        header { 
            padding: 15px 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(30, 41, 59, 0.95); 
            backdrop-filter: blur(10px); 
            z-index: 100;
            flex-shrink: 0;
        }

        .btn-sair { background: rgba(255, 71, 87, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }

        /* Área de Conteúdo com Scroll */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            padding-bottom: 110px; /* Espaço para o menu inferior não cobrir o conteúdo */
            scrollbar-width: none; 
        }
        .content::-webkit-scrollbar { display: none; }

        /* Menu Inferior Quadrado e Responsivo */
        .nav-bar { 
            position: absolute; 
            bottom: 0; 
            left: 0;
            width: 100%; 
            height: 85px; 
            background: #1e293b; 
            border-top: 1px solid var(--border); 
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 colunas iguais */
            padding: 10px;
            gap: 8px;
            z-index: 100;
        }

        .nav-item { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim); 
            cursor: pointer; 
            font-size: 0.65rem; 
            font-weight: 600;
            border-radius: 12px; /* Deixa o "quadrado" levemente arredondado */
            transition: all 0.2s ease;
        }

        .nav-item i { font-size: 1.3rem; margin-bottom: 5px; }

        /* Estado Ativo do Menu */
        .nav-item.active { 
            color: var(--primary); 
            background: rgba(0, 255, 136, 0.1);
            box-shadow: inset 0 0 0 1px var(--primary-glow);
        }

        /* Formulários e Inputs */
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: rgba(15, 23, 42, 0.5); padding: 5px; border-radius: 15px; }
        .auth-tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-dim); cursor: pointer; font-weight: 700; border-radius: 10px; }
        .auth-tab-btn.active { background: var(--primary); color: #000; }

        .pass-container { position: relative; width: 100%; }
        .pass-container input { padding-right: 45px; }
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); cursor: pointer; z-index: 5; }

        .input-group { margin-bottom: 15px; }
        label { font-size: 0.65rem; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; display: block; }
        input, textarea { width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.7); border: 1px solid #334155; border-radius: 12px; color: white; font-size: 0.95rem; outline: none; }
        
        .btn-main { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 15px; font-weight: 700; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Cards e Avatares */
        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .avatar-option { aspect-ratio: 1; border-radius: 12px; border: 2px solid transparent; cursor: pointer; background: #334155; display: flex; align-items: center; justify-content: center; color: var(--text-dim); }
        .avatar-option.selected { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); }

        .card-glass { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .header-avatar { width: 38px; height: 38px; border-radius: 10px; background: var(--primary-glow); display: flex; align-items: center; justify-content: center; border: 1px solid var(--primary); }
        .hidden { display: none !important; }
        .success-text { color: var(--primary); font-weight: bold; }
        .danger-text { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-card">
    
    <div id="modal-config" class="hidden" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.98); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--card-bg); width:100%; padding:25px; border-radius:var(--radius); border:1px solid var(--border);">
            <h3>Ajustes da Loja</h3>
            <div class="input-group" style="margin-top:15px"><label>Nome da Empresa</label><input type="text" id="config-nome-loja"></div>
            <div class="avatar-grid" id="grid-icones">
                <div class="avatar-option selected" data-icon="fa-store"><i class="fa-solid fa-store"></i></div>
                <div class="avatar-option" data-icon="fa-scissors"><i class="fa-solid fa-scissors"></i></div>
                <div class="avatar-option" data-icon="fa-utensils"><i class="fa-solid fa-utensils"></i></div>
                <div class="avatar-option" data-icon="fa-car"><i class="fa-solid fa-car"></i></div>
                <div class="avatar-option" data-icon="fa-bag-shopping"><i class="fa-solid fa-bag-shopping"></i></div>
                <div class="avatar-option" data-icon="fa-paw"><i class="fa-solid fa-paw"></i></div>
                <div class="avatar-option" data-icon="fa-dumbbell"><i class="fa-solid fa-dumbbell"></i></div>
                <div class="avatar-option" data-icon="fa-stethoscope"><i class="fa-solid fa-stethoscope"></i></div>
                <div class="avatar-option" data-icon="fa-coffee"><i class="fa-solid fa-coffee"></i></div>
                <div class="avatar-option" data-icon="fa-sparkles"><i class="fa-solid fa-sparkles"></i></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button class="btn-main" style="background: #334155; color: white;" onclick="toggleConfig()">Cancelar</button>
                <button class="btn-main" onclick="salvarConfigFirebase()">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <header id="header-main" class="hidden">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="header-avatar" id="main-avatar-icon"><i class="fa-solid fa-store"></i></div>
            <h2 id="display-loja" style="font-size: 0.9rem;">DAPfy Connect</h2>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <button onclick="toggleConfig()" style="background:none; border:none; color:var(--text-dim); font-size: 1.1rem; cursor:pointer"><i class="fa-solid fa-gear"></i></button>
            <button class="btn-sair" onclick="fLogout()">Sair</button>
        </div>
    </header>

    <div class="content">
        <section id="screen-auth">
            <div style="text-align: center; margin-bottom: 30px;">
                <i class="fa-solid fa-bolt-lightning" style="font-size: 3rem; color: var(--primary);"></i>
                <h1 style="margin-top: 10px;">DAPfy Connect</h1>
            </div>
            <div class="auth-tabs">
                <button id="btn-tab-login" class="auth-tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button id="btn-tab-cadastro" class="auth-tab-btn" onclick="switchAuthTab('cadastro')">Cadastrar</button>
            </div>
            <div id="group-loja-name" class="input-group hidden"><label>Nome da Loja</label><input type="text" id="auth-loja" placeholder="Ex: Barber Shop"></div>
            <div class="input-group"><label>E-mail</label><input type="email" id="auth-email"></div>
            <div class="input-group"><label>Senha</label>
                <div class="pass-container">
                    <input type="password" id="auth-pass" placeholder="••••••••">
                    <i class="fa-solid fa-eye toggle-pass" id="eye-icon" onclick="togglePassView()"></i>
                </div>
            </div>
            <button class="btn-main" onclick="fAuth()">Entrar no Sistema</button>
        </section>

        <section id="tab-inicio" class="hidden">
            <label>Buscar por CPF</label>
            <input type="text" id="cpf-busca" maxlength="11" placeholder="Somente números">
            <button class="btn-main" style="margin-top:10px" onclick="buscarCliente()"><i class="fa-solid fa-search"></i> Consultar</button>
            <div id="busca-resultado" class="hidden" style="margin-top: 20px;">
                <div class="card-glass">
                    <span style="font-size: 0.7rem; color: var(--text-dim);">Saldo Acumulado</span>
                    <h2 class="success-text" style="font-size: 2rem;">R$ <span id="res-saldo">0.00</span></h2>
                </div>
            </div>
        </section>

        <section id="tab-lancar" class="hidden">
            <h3>Lançar Cashback</h3>
            <div class="card-glass">
                <input type="text" id="lancar-cpf" readonly style="margin-bottom:10px; opacity:0.6">
                <label>Valor da Venda</label><input type="number" id="valor-venda" oninput="calcLancar()">
                <label style="margin-top:10px">% de Retorno</label><input type="number" id="porcentagem-venda" value="5" oninput="calcLancar()">
                <h2 class="success-text" style="text-align: right; margin-top:10px">R$ <span id="previa-lancar">0.00</span></h2>
            </div>
            <button class="btn-main" onclick="fLancar()">Confirmar Lançamento</button>
        </section>

        <section id="tab-resgate" class="hidden">
            <h3>Resgate de Pontos</h3>
            <div class="card-glass">
                <input type="text" id="resgate-cpf" maxlength="11" placeholder="CPF do Cliente">
                <button class="btn-main" style="background:#334155; margin-top:10px" onclick="vSaldoResgate()">Verificar</button>
                <div id="box-resgate-acao" class="hidden">
                    <h2 class="success-text" style="margin-top:15px">Disponível: R$ <span id="resgate-saldo-viva">0.00</span></h2>
                    <input type="number" id="valor-resgate" placeholder="Valor a descontar">
                    <button class="btn-main" style="background:var(--danger); color:white; margin-top:15px;" onclick="fResgatar()">Confirmar Resgate</button>
                </div>
            </div>
        </section>

        <section id="tab-mural" class="hidden">
            <h3>Mural de Promoções</h3>
            <div class="card-glass">
                <input type="text" id="mural-titulo" placeholder="Título"><textarea id="mural-desc" rows="2" placeholder="Descreva a oferta..." style="margin-top:10px"></textarea>
                <button class="btn-main" style="margin-top:10px" onclick="fPublicar()">Publicar Agora</button>
            </div>
            <div id="feed-ofertas"></div>
        </section>

        <section id="tab-registros" class="hidden"><h3>Histórico de Transações</h3><div id="lista-hist"></div></section>
    </div>

    <nav id="nav-main" class="nav-bar hidden">
        <div class="nav-item active" onclick="swTab('inicio', this)"><i class="fa-solid fa-search"></i><span>Início</span></div>
        <div class="nav-item" onclick="swTab('lancar', this)"><i class="fa-solid fa-plus-circle"></i><span>Lançar</span></div>
        <div class="nav-item" onclick="swTab('resgate', this)"><i class="fa-solid fa-coins"></i><span>Resgate</span></div>
        <div class="nav-item" onclick="swTab('mural', this)"><i class="fa-solid fa-bullhorn"></i><span>Mural</span></div>
        <div class="nav-item" onclick="swTab('registros', this)"><i class="fa-solid fa-clock-rotate-left"></i><span>Histórico</span></div>
    </nav>
</div>

<script type="module">
    // --- SUA LÓGICA DE FIREBASE (MANTIDA 100%) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7SbPIwTdTdxpuDHeV0onKi88XFLmdYyw",
      authDomain: "dapfycashback-92583.firebaseapp.com",
      projectId: "dapfycashback-92583",
      storageBucket: "dapfycashback-92583.firebasestorage.app",
      messagingSenderId: "1041877443665",
      appId: "1:1041877443665:web:0792707a9f1abe28c80470"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentAuthMode = 'login';
    let lojistaData = null;

    window.fAuth = async () => {
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-pass').value;
        const l = document.getElementById('auth-loja').value;
        if(!e || !p) return alert("Preencha e-mail e senha");

        try {
            if(currentAuthMode === 'cadastro') {
                if(!l) return alert("Dê um nome à sua loja");
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "lojistas", res.user.uid), {
                    nomeLoja: l, icone: 'fa-store', registros: [], ofertas: []
                });
            } else {
                await signInWithEmailAndPassword(auth, e, p);
            }
        } catch (err) { alert("Falha: " + err.message); }
    };

    onAuthStateChanged(auth, (user) => {
        if(user) {
            onSnapshot(doc(db, "lojistas", user.uid), (snap) => {
                if(snap.exists()){
                    lojistaData = snap.data();
                    document.getElementById('display-loja').innerText = lojistaData.nomeLoja;
                    document.getElementById('main-avatar-icon').innerHTML = `<i class="fa-solid ${lojistaData.icone}" style="color: var(--primary);"></i>`;
                    renderMural(); renderHist();
                    document.getElementById('screen-auth').classList.add('hidden');
                    document.querySelectorAll('#header-main, #nav-main, #tab-inicio').forEach(el => el.classList.remove('hidden'));
                }
            });
        } else {
            document.getElementById('screen-auth').classList.remove('hidden');
            document.querySelectorAll('#header-main, #nav-main, section:not(#screen-auth)').forEach(el => el.classList.add('hidden'));
        }
    });

    window.fLogout = () => confirm("Sair do DAPfy Connect?") && signOut(auth);

    window.buscarCliente = () => {
        const cpf = document.getElementById('cpf-busca').value;
        if(cpf.length < 11) return alert("CPF Incompleto");
        let saldo = 0;
        lojistaData.registros.filter(r => r.cpf === cpf).forEach(r => {
            saldo += (r.type === 'IN' ? parseFloat(r.val) : -parseFloat(r.val));
        });
        document.getElementById('res-saldo').innerText = saldo.toFixed(2);
        document.getElementById('busca-resultado').classList.remove('hidden');
        document.getElementById('lancar-cpf').value = cpf;
    };

    window.fLancar = async () => {
        const cash = document.getElementById('previa-lancar').innerText;
        const cpf = document.getElementById('lancar-cpf').value;
        if(parseFloat(cash) <= 0) return alert("Valor inválido");
        if(confirm(`Confirmar R$ ${cash} de crédito para o CPF ${cpf}?`)) {
            await updateDoc(doc(db, "lojistas", auth.currentUser.uid), {
                registros: arrayUnion({ type:'IN', cpf, val: cash, data: new Date().toLocaleDateString() })
            });
            alert("Sucesso!");
            document.getElementById('valor-venda').value = "";
            swTab('registros', document.querySelectorAll('.nav-item')[4]);
        }
    };

    window.vSaldoResgate = () => {
        const cpf = document.getElementById('resgate-cpf').value;
        let saldo = 0;
        lojistaData.registros.filter(r => r.cpf === cpf).forEach(r => {
            saldo += (r.type === 'IN' ? parseFloat(r.val) : -parseFloat(r.val));
        });
        document.getElementById('resgate-saldo-viva').innerText = saldo.toFixed(2);
        document.getElementById('box-resgate-acao').classList.remove('hidden');
    };

    window.fResgatar = async () => {
        const val = parseFloat(document.getElementById('valor-resgate').value);
        const cpf = document.getElementById('resgate-cpf').value;
        const disp = parseFloat(document.getElementById('resgate-saldo-viva').innerText);
        if(val > disp) return alert("Saldo insuficiente");
        if(confirm(`Confirmar resgate de R$ ${val.toFixed(2)}?`)) {
            await updateDoc(doc(db, "lojistas", auth.currentUser.uid), {
                registros: arrayUnion({ type:'OUT', cpf, val: val.toFixed(2), data: new Date().toLocaleDateString() })
            });
            alert("Resgate realizado!");
            document.getElementById('valor-resgate').value = "";
            swTab('registros', document.querySelectorAll('.nav-item')[4]);
        }
    };

    window.fPublicar = async () => {
        const t = document.getElementById('mural-titulo').value;
        const d = document.getElementById('mural-desc').value;
        if(!t || !d) return;
        await updateDoc(doc(db, "lojistas", auth.currentUser.uid), {
            ofertas: arrayUnion({ id: Date.now(), t, d })
        });
        document.getElementById('mural-titulo').value = ""; document.getElementById('mural-desc').value = "";
    };

    window.salvarConfigFirebase = async () => {
        const n = document.getElementById('config-nome-loja').value || lojistaData.nomeLoja;
        const i = document.querySelector('.avatar-option.selected').dataset.icon;
        await updateDoc(doc(db, "lojistas", auth.currentUser.uid), { nomeLoja: n, icone: i });
        toggleConfig();
    };

    window.renderMural = () => {
        document.getElementById('feed-ofertas').innerHTML = lojistaData.ofertas.map(o => `
            <div class="card-glass">
                <div style="display:flex; align-items:center; gap:8px"><i class="fa-solid ${lojistaData.icone} success-text"></i><small>${lojistaData.nomeLoja}</small></div>
                <h4 class="success-text" style="margin-top:10px">${o.t}</h4><p style="font-size:0.8rem">${o.d}</p>
            </div>
        `).reverse().join('');
    };

    window.renderHist = () => {
        document.getElementById('lista-hist').innerHTML = lojistaData.registros.map(r => `
            <div class="card-glass">
                <div style="display:flex; justify-content:space-between"><strong>CPF: ${r.cpf}</strong><small>${r.data}</small></div>
                <div class="${r.type=='IN'?'success-text':'danger-text'}">${r.type=='IN'?'+ R$':'- R$'} ${r.val}</div>
            </div>
        `).reverse().join('');
    };

    window.swTab = (id, el) => {
        document.querySelectorAll('.content section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-'+id).classList.remove('hidden');
        el.classList.add('active');
    };

    window.switchAuthTab = (mode) => {
        currentAuthMode = mode;
        document.getElementById('btn-tab-login').classList.toggle('active', mode === 'login');
        document.getElementById('btn-tab-cadastro').classList.toggle('active', mode === 'cadastro');
        document.getElementById('group-loja-name').classList.toggle('hidden', mode === 'login');
    };

    window.togglePassView = () => {
        const p = document.getElementById('auth-pass');
        p.type = p.type === 'password' ? 'text' : 'password';
        document.getElementById('eye-icon').classList.toggle('fa-eye-slash');
    };

    window.calcLancar = () => {
        const v = parseFloat(document.getElementById('valor-venda').value) || 0;
        const p = parseFloat(document.getElementById('porcentagem-venda').value) || 0;
        document.getElementById('previa-lancar').innerText = (v * (p/100)).toFixed(2);
    };

    window.toggleConfig = () => document.getElementById('modal-config').classList.toggle('hidden');

    document.querySelectorAll('.avatar-option').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
        };
    });
</script>
</body>
</html>
